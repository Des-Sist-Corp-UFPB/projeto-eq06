spring:
  application:
    name: mercado
  profiles:
    active: dev

# Chave de API do Gemini (Carregada da variável de ambiente GEMINI_API_KEY)
# Deixe vazio ou 'sua_chave_aqui' se ainda não tiver uma configurada
gemini:
  api:
    key: ${GEMINI_API_KEY:AQ.Ab8RN6LCOffQnGPY7GfhvlJg-U72Xjag-NjyrOBfxRWaTnyJEA}

# Actuator - monitoramento da aplicação
# Acesse: http://localhost:8080/actuator/health
management:
  endpoints:
    web:
      exposure:
        # Expõe apenas os endpoints necessários (não exponha todos em produção!)
        include: health,info,metrics
  endpoint:
    health:
      # Detalhes do health só são exibidos para usuários autenticados
      show-details: when-authorized
